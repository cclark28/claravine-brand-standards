<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" role="img" aria-label="Claravine logo">
  <title>Claravine</title>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&amp;display=swap');</style>
  </defs>
  <!-- Step mark: two rectangles forming brand icon -->
